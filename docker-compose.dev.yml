# docker-compose.dev.yml
# Run with: docker compose -f docker-compose.dev.yml up --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: lyzgame-postgres-dev
    environment:
      POSTGRES_USER: lyzdev
      POSTGRES_PASSWORD: lyzdevpassword
      POSTGRES_DB: lyzgamedev
    ports:
      - "5433:5432"
    volumes:
      - lyzgame_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lyzdev -d lyzgamedev"]
      interval: 5s
      timeout: 5s
      retries: 5

  lyzgame-space:
    build:
      context: .
      no_cache: true
    image: lyz-game-space-dev
    container_name: lyzgame-container-dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=postgresql://lyzdev:lyzdevpassword@postgres:5432/lyzgamedev
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET}
      - AUTH_GITHUB_ID=${AUTH_GITHUB_ID}
      - AUTH_GITHUB_SECRET=${AUTH_GITHUB_SECRET}
      - NEXTAUTH_URL=http://localhost:3004
    ports:
      - "3004:3000"
    restart: unless-stopped

volumes:
  lyzgame_dev_data: